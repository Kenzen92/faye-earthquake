services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-faye}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faye}
      POSTGRES_DB: ${POSTGRES_DB:-faye_earthquake}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-faye}:${POSTGRES_PASSWORD:-faye}@db:5432/${POSTGRES_DB:-faye_earthquake}?ssl=disable
      DEBUG: "false"
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
